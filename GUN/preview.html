<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>총기 디자인 프리뷰</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08090c; color: #e0e8f0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
  #c { position: fixed; inset: 0; }

  #top {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: linear-gradient(180deg, rgba(0,0,0,0.88) 0%, transparent 100%);
    pointer-events: none; z-index: 10;
  }
  #logo { font-size: 12px; letter-spacing: 4px; color: #4af5f5; font-weight: 700; }
  #tabs { display: flex; gap: 6px; pointer-events: all; }
  .tab {
    padding: 8px 20px; border: 1px solid rgba(74,245,245,0.2);
    background: rgba(0,0,0,0.55); color: #5a7a8a;
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.18s; font-family: inherit;
  }
  .tab:hover { border-color: rgba(74,245,245,0.45); color: #aae8f0; }
  .tab.on { background: rgba(74,245,245,0.1); border-color: #4af5f5; color: #4af5f5; box-shadow: 0 0 10px rgba(74,245,245,0.18); }

  #bot {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 18px 32px 22px;
    background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, transparent 100%);
    display: flex; align-items: flex-end; justify-content: space-between;
    pointer-events: none; z-index: 10;
  }
  #gtype { font-size: 10px; letter-spacing: 3px; color: #4af5f5; margin-bottom: 5px; }
  #gname { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
  #stats { display: flex; gap: 26px; }
  .st { text-align: center; }
  .sv { font-size: 20px; font-weight: 700; color: #fff; }
  .sb { margin: 3px auto 0; width: 54px; height: 2px; background: rgba(255,255,255,0.08); }
  .sbf { height: 100%; background: #4af5f5; transition: width 0.45s; }
  .sl { font-size: 9px; color: #3a5a6a; letter-spacing: 2px; margin-top: 3px; }
  #hint { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: #283840; letter-spacing: 2px; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="top">
  <div id="logo">RECLAIM — GUN PREVIEW</div>
  <div id="tabs">
    <button class="tab on" onclick="sel(0)">M4A1</button>
    <button class="tab"    onclick="sel(1)">SPAS-12</button>
    <button class="tab"    onclick="sel(2)">AWP</button>
  </div>
</div>

<div id="bot">
  <div><div id="gtype">돌격소총 · ASSAULT RIFLE</div><div id="gname">M4A1</div></div>
  <div id="stats"></div>
</div>
<div id="hint">드래그 회전 &nbsp;|&nbsp; 스크롤 줌 &nbsp;|&nbsp; 키 1·2·3 전환</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── Renderer ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const R = new THREE.WebGLRenderer({ canvas, antialias: true });
R.setPixelRatio(Math.min(devicePixelRatio, 2));
R.setSize(innerWidth, innerHeight);
R.shadowMap.enabled = true;
R.shadowMap.type = THREE.PCFSoftShadowMap;
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 1.15;

// ── Scene / Camera / Controls ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08090c);
scene.fog = new THREE.FogExp2(0x08090c, 0.14);

const cam = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.01, 60);
cam.position.set(0, 0.55, 4.6);

const oc = new THREE.OrbitControls(cam, canvas);
oc.enableDamping = true; oc.dampingFactor = 0.07;
oc.minDistance = 1.0; oc.maxDistance = 9;
oc.target.set(0, 0, 0);

// ── Lights ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x18232e, 2.8));

const key = new THREE.DirectionalLight(0xd0e8ff, 4.2);
key.position.set(3, 6, 5); key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
scene.add(key);

const fill = new THREE.DirectionalLight(0x4af5f5, 0.55);
fill.position.set(-5, 2, -3); scene.add(fill);

const rim = new THREE.DirectionalLight(0x6688cc, 0.7);
rim.position.set(-2, -2, -6); scene.add(rim);

// ── Floor grid ────────────────────────────────────────────────────────────
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 14),
  new THREE.MeshStandardMaterial({ color: 0x0c1216, roughness: 0.95, metalness: 0.05 })
);
floor.rotation.x = -Math.PI / 2; floor.position.y = -0.9; floor.receiveShadow = true;
scene.add(floor);
const grid = new THREE.GridHelper(12, 22, 0x182838, 0x0e1822);
grid.position.y = -0.89; scene.add(grid);

// ── Material factory ──────────────────────────────────────────────────────
const M = (c, r, m, e, ei) => new THREE.MeshStandardMaterial({
  color: c, roughness: r, metalness: m,
  ...(e != null ? { emissive: e, emissiveIntensity: ei || 0.3 } : {})
});

// ── Geometry helpers ──────────────────────────────────────────────────────
// HZ = cylinder rotated to lie along X axis (gun length direction)
const HZ = Math.PI / 2;
// HX = cylinder rotated to lie along Z axis (side protrusion)
const HX = Math.PI / 2;

function bx(w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.castShadow = true; m.receiveShadow = true; return m;
}
function cy(rt, rb, len, seg, mat) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, len, seg), mat);
  m.castShadow = true; m.receiveShadow = true; return m;
}
function put(grp, mesh, x, y, z, rx, ry, rz) {
  mesh.position.set(x, y, z);
  if (rx) mesh.rotation.x = rx;
  if (ry) mesh.rotation.y = ry;
  if (rz) mesh.rotation.z = rz;
  grp.add(mesh); return mesh;
}

// ═══════════════════════════════════════════════════════════════════════════
// GUN 1 — M4A1  (oriented along X: muzzle = +X, up = +Y)
// ═══════════════════════════════════════════════════════════════════════════
function mkM4() {
  const g = new THREE.Group();

  // Palette
  const body  = M(0x1e2228, 0.55, 0.68);
  const upper = M(0x252b32, 0.45, 0.75);
  const rail  = M(0x2c3440, 0.22, 0.93);
  const brl   = M(0x606e7c, 0.14, 0.96);
  const grip  = M(0x0d1013, 0.88, 0.05);
  const stk   = M(0x1a1e24, 0.72, 0.18);
  const chr   = M(0x8898a8, 0.1,  0.97);
  const fh    = M(0x383e46, 0.3,  0.88);

  // ── Lower receiver
  put(g, bx(1.0, 0.14, 0.076, body), 0, 0, 0);
  // ── Upper receiver (sits directly on top)
  put(g, bx(0.9, 0.11, 0.072, upper), 0, 0.125, 0);
  // ── Flat-top Picatinny rail
  put(g, bx(0.88, 0.024, 0.05, rail), 0, 0.198, 0);
  // Rail teeth
  for (let i = 0; i < 10; i++)
    put(g, bx(0.024, 0.015, 0.053, rail), -0.385 + i * 0.086, 0.212, 0);

  // ── Barrel  (rz=π/2 → extends along X)
  put(g, cy(0.022, 0.022, 0.92, 12, brl), 0.71, 0.08, 0, 0, 0, HZ);
  // Gas block (solid block at mid-barrel)
  put(g, bx(0.07, 0.07, 0.07, body), 0.32, 0.08, 0);
  // Gas tube (thin rod above barrel)
  put(g, cy(0.007, 0.007, 0.52, 8, chr), 0.16, 0.158, 0, 0, 0, HZ);

  // ── Birdcage flash hider
  put(g, cy(0.028, 0.024, 0.085, 6, fh), 1.205, 0.08, 0, 0, 0, HZ);
  put(g, cy(0.02, 0.026, 0.035, 6, fh),  1.25,  0.08, 0, 0, 0, HZ);
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    const p = bx(0.01, 0.034, 0.01, fh);
    p.position.set(1.268, 0.08 + Math.sin(a) * 0.023, Math.cos(a) * 0.023);
    g.add(p);
  }

  // ── Quad-rail handguard
  put(g, bx(0.44, 0.084, 0.086, body), 0.28, 0.08, 0);
  put(g, bx(0.42, 0.02,  0.05,  rail), 0.28, 0.124, 0);  // top rail
  put(g, bx(0.42, 0.02,  0.05,  rail), 0.28, 0.037, 0);  // bottom rail
  put(g, bx(0.42, 0.05,  0.02,  rail), 0.28, 0.08,  0.054); // side rails
  put(g, bx(0.42, 0.05,  0.02,  rail), 0.28, 0.08, -0.054);

  // ── Front sight post
  put(g, bx(0.018, 0.09, 0.036, body), 0.488, 0.18, 0);
  put(g, bx(0.018, 0.05, 0.065, body), 0.488, 0.16, 0); // wings
  put(g, cy(0.004, 0.004, 0.028, 6, chr), 0.488, 0.242, 0); // post (vertical, default Y)

  // ── Magazine (30-rd STANAG, slight forward cant)
  const mag = new THREE.Group();
  put(mag, bx(0.076, 0.28, 0.062, grip), 0, -0.1, 0);
  put(mag, bx(0.08,  0.04, 0.065, body), 0,  0.065, 0); // mag lips
  put(mag, bx(0.07,  0.024,0.058, grip), 0, -0.258, 0); // base
  mag.position.set(-0.055, -0.105, 0); mag.rotation.z = 0.09;
  g.add(mag);

  // ── Pistol grip
  const grp = new THREE.Group();
  put(grp, bx(0.06, 0.2, 0.074, grip), 0, -0.062, 0);
  for (let i = 0; i < 4; i++)
    put(grp, bx(0.062, 0.012, 0.076, M(0x09090c, 0.9, 0.02)), 0, -0.018 - i * 0.04, 0);
  put(grp, bx(0.052, 0.065, 0.072, grip), 0, 0.12, 0); // swell
  grp.position.set(-0.19, -0.09, 0); grp.rotation.z = 0.3;
  g.add(grp);

  // ── Trigger guard
  put(g, bx(0.145, 0.012, 0.047, upper), -0.115, -0.082, 0);
  put(g, bx(0.012, 0.075, 0.047, upper), -0.042, -0.046, 0);
  put(g, bx(0.012, 0.075, 0.047, upper), -0.188, -0.046, 0);
  put(g, bx(0.01,  0.048, 0.013, chr),   -0.115, -0.042, 0); // trigger

  // ── Charging handle
  put(g, bx(0.058, 0.022, 0.032, body), -0.275, 0.198, 0);
  put(g, bx(0.022, 0.016, 0.052, body), -0.285, 0.206, 0);

  // ── Buffer tube  (rz=π/2 → along X)
  put(g, cy(0.034, 0.034, 0.38, 12, upper),  -0.665, 0.068, 0, 0, 0, HZ);
  put(g, cy(0.042, 0.042, 0.022, 8, rail),   -0.485, 0.068, 0, 0, 0, HZ); // castle nut

  // ── M4 collapsible stock
  put(g, bx(0.21, 0.092, 0.07,  stk), -0.86,  0.044, 0);
  put(g, bx(0.032,0.165, 0.07,  stk), -0.966, 0.002, 0);
  put(g, bx(0.155,0.044, 0.066, stk), -0.848, 0.134, 0); // cheek rest
  put(g, bx(0.022,0.172, 0.076, grip),-0.984, 0.002, 0); // rubber pad

  // ── Rear BUIS aperture
  put(g, bx(0.05, 0.042, 0.066, body), -0.215, 0.218, 0);

  // ── Side details (along Z axis → rx=π/2)
  put(g, cy(0.015, 0.015, 0.026, 8, body), 0.1, 0.132, 0.04, HX); // forward assist
  put(g, cy(0.013, 0.013, 0.013, 8, chr),  -0.175, 0.022, 0.04, HX); // selector
  put(g, bx(0.016, 0.04, 0.013, chr), -0.02, -0.005, 0.04); // bolt catch

  // Center the group: x range ~[-0.997, 1.27] → center ~0.137
  //                   y range ~[-0.37,  0.22]  → center ~-0.075
  g.position.set(-0.137, 0.075, 0);
  return g;
}

// ═══════════════════════════════════════════════════════════════════════════
// GUN 2 — SPAS-12  (muzzle = +X, up = +Y)
// ═══════════════════════════════════════════════════════════════════════════
function mkSPAS() {
  const g = new THREE.Group();

  const body  = M(0x151719, 0.62, 0.55);
  const brl   = M(0x4e5660, 0.18, 0.93);
  const tube  = M(0x5c6470, 0.15, 0.95);
  const pump  = M(0x0d0f11, 0.82, 0.12);
  const grip  = M(0x0a0c0e, 0.9,  0.05);
  const stk   = M(0x1c1f24, 0.68, 0.2);
  const heat  = M(0x2a2e35, 0.35, 0.82);
  const chr   = M(0x7a8898, 0.12, 0.95);

  // ── Main receiver (thick box)
  put(g, bx(0.68, 0.22, 0.092, body),  0, 0, 0);
  put(g, bx(0.64, 0.038, 0.086, heat), 0, 0.129, 0); // top cover

  // ── Barrel  (rz=π/2)
  put(g, cy(0.042, 0.042, 0.58, 14, brl),  0.49, 0.065, 0, 0, 0, HZ);
  // Inner bore
  put(g, cy(0.029, 0.029, 0.62, 14, body), 0.51, 0.065, 0, 0, 0, HZ);
  // Muzzle lip
  put(g, cy(0.048, 0.042, 0.042, 8, heat), 0.802, 0.065, 0, 0, 0, HZ);

  // ── Heat shield (vented) above barrel
  put(g, bx(0.58, 0.026, 0.096, heat), 0.47, 0.115, 0);
  for (let i = 0; i < 10; i++)
    put(g, bx(0.012, 0.024, 0.098, body), 0.19 + i * 0.055, 0.115, 0); // vents

  // ── Magazine tube under barrel  (rz=π/2)
  put(g, cy(0.038, 0.038, 0.62, 14, tube), 0.48, -0.076, 0, 0, 0, HZ);
  put(g, cy(0.044, 0.044, 0.024, 10, body), 0.80, -0.076, 0, 0, 0, HZ); // cap
  // Magazine tube cap nut
  put(g, cy(0.05, 0.05, 0.018, 8, heat), 0.788, -0.076, 0, 0, 0, HZ);

  // ── Pump forend
  put(g, bx(0.2, 0.075, 0.1, pump), 0.46, -0.005, 0);
  for (let i = 0; i < 6; i++)  // ridges
    put(g, bx(0.009, 0.077, 0.102, body), 0.38 + i * 0.036, -0.005, 0);
  // Pump arms
  put(g, bx(0.009, 0.072, 0.006, heat), 0.46, -0.005,  0.046);
  put(g, bx(0.009, 0.072, 0.006, heat), 0.46, -0.005, -0.046);

  // ── Front bead sight
  put(g, cy(0.007, 0.007, 0.018, 6, chr), 0.80, 0.112, 0); // vertical bead

  // ── Pistol grip
  const grp = new THREE.Group();
  put(grp, bx(0.074, 0.22, 0.086, grip), 0, -0.065, 0);
  for (let i = 0; i < 5; i++)
    put(grp, bx(0.076, 0.014, 0.088, M(0x07080a, 0.92, 0.02)), 0, -0.01 - i * 0.038, 0);
  put(grp, bx(0.064, 0.07, 0.084, grip), 0, 0.13, 0); // upper swell
  grp.position.set(-0.18, -0.095, 0); grp.rotation.z = 0.2;
  g.add(grp);

  // ── Trigger guard
  put(g, bx(0.16,  0.013, 0.05, body), -0.1, -0.115, 0);
  put(g, bx(0.013, 0.08,  0.05, body), -0.02,-0.075, 0);
  put(g, bx(0.013, 0.08,  0.05, body), -0.18,-0.075, 0);
  put(g, bx(0.01,  0.048, 0.013, chr), -0.1, -0.076, 0); // trigger

  // ── Folding stock (SPAS-12 wire frame style)
  // Top bar
  put(g, bx(0.32,  0.024, 0.02, stk), -0.4, 0.142, 0);
  // Rear vertical strut
  put(g, bx(0.024, 0.27,  0.02, stk), -0.55, 0.01, 0);
  // Horizontal bottom bar
  put(g, bx(0.16,  0.024, 0.02, stk), -0.472,-0.123, 0);
  // Shoulder pad
  put(g, bx(0.035, 0.2,   0.074, body), -0.563, 0.01, 0);
  // Cross braces (give it some depth with Z-offset pairs)
  put(g, bx(0.024, 0.024, 0.068, stk), -0.55, 0.142, 0);
  put(g, bx(0.024, 0.024, 0.068, stk), -0.55,-0.123, 0);
  // Side rails of stock (two bars on each side)
  for (let s of [-1, 1]) {
    put(g, bx(0.024, 0.27,  0.02, stk), -0.55, 0.01, s * 0.038);
  }

  // ── Loading port
  put(g, bx(0.13, 0.055, 0.094, M(0x08090b, 0.95, 0.1)), 0.08, 0.04, 0);

  // Center: x ~[-0.58, 0.82] → center 0.12;  y ~[-0.31, 0.15] → center -0.08
  g.position.set(-0.12, 0.08, 0);
  return g;
}

// ═══════════════════════════════════════════════════════════════════════════
// GUN 3 — AWP  (muzzle = +X, up = +Y)
// ═══════════════════════════════════════════════════════════════════════════
function mkAWP() {
  const g = new THREE.Group();

  const act   = M(0x191c21, 0.5,  0.72);
  const brl   = M(0x686e7a, 0.12, 0.96);
  const scope = M(0x0c0e12, 0.28, 0.82);
  const lens  = M(0x0e1f38, 0.05, 0.3, 0x224488, 0.55);
  const stk   = M(0x1a2218, 0.78, 0.1);
  const grip  = M(0x0e1408, 0.9,  0.05);
  const mnt   = M(0x2c3138, 0.38, 0.88);
  const blt   = M(0x7888a0, 0.14, 0.95);
  const bipod = M(0x4e5660, 0.2,  0.9);

  // ── Action / receiver
  put(g, bx(0.72, 0.17, 0.078, act), 0, 0, 0);
  put(g, bx(0.68, 0.05, 0.072, act), 0, 0.11, 0); // top of action

  // ── Barrel channel (stock fore-end under action)
  put(g, bx(0.72, 0.065, 0.065, stk), 0, -0.056, 0);

  // ── Heavy barrel  (rz=π/2)
  put(g, cy(0.024, 0.024, 1.32, 16, brl), 0.87, 0.04, 0, 0, 0, HZ);
  // Barrel step (heavier section near action)
  put(g, cy(0.032, 0.032, 0.09, 12, brl), 0.64, 0.04, 0, 0, 0, HZ);

  // ── Muzzle brake
  put(g, cy(0.04, 0.035, 0.1,  8, brl),  1.485, 0.04, 0, 0, 0, HZ);
  for (let i = 0; i < 3; i++)
    put(g, bx(0.024, 0.028, 0.044, act), 1.46 + i * 0.026, 0.066, 0); // top ports
  put(g, cy(0.03,  0.038, 0.03, 8, brl), 1.548, 0.04, 0, 0, 0, HZ); // tip

  // ── Scope body (large main tube)  (rz=π/2)
  put(g, cy(0.066, 0.066, 0.56, 22, scope), 0.07, 0.242, 0, 0, 0, HZ);
  // Ocular bell (rear)
  put(g, cy(0.084, 0.066, 0.105, 20, scope), -0.175, 0.242, 0, 0, 0, HZ);
  // Objective bell (front)
  put(g, cy(0.078, 0.066, 0.105, 20, scope),  0.315, 0.242, 0, 0, 0, HZ);
  // Lenses
  put(g, cy(0.07,  0.07,  0.01,  22, lens),  -0.23,  0.242, 0, 0, 0, HZ); // ocular
  put(g, cy(0.064, 0.064, 0.01,  22, lens),   0.37,  0.242, 0, 0, 0, HZ); // objective
  // Elevation turret (top, along Y = vertical, no rotation needed)
  put(g, cy(0.022, 0.022, 0.06, 8, mnt), 0.07, 0.315, 0);
  put(g, cy(0.016, 0.016, 0.01, 6, blt), 0.07, 0.348, 0); // cap
  // Windage turret (side, along Z → rx=π/2)
  put(g, cy(0.022, 0.022, 0.06, 8, mnt), 0.07, 0.242, 0.094, HX);
  put(g, cy(0.016, 0.016, 0.01, 6, blt), 0.07, 0.242, 0.127, HX);

  // ── Scope rings (2)
  for (let xp of [-0.07, 0.22]) {
    put(g, bx(0.055, 0.075, 0.065, mnt), xp, 0.162, 0); // base block
    put(g, bx(0.038, 0.022, 0.056, mnt), xp, 0.13,  0); // rail clamp
    // Ring clamp halves (left/right)
    put(g, bx(0.016, 0.032, 0.07, mnt), xp, 0.23,  0.072);
    put(g, bx(0.016, 0.032, 0.07, mnt), xp, 0.23, -0.072);
    // Ring screws (along Z)
    put(g, cy(0.007, 0.007, 0.01, 6, blt), xp, 0.242, 0.076, HX);
    put(g, cy(0.007, 0.007, 0.01, 6, blt), xp, 0.242,-0.076, HX);
  }

  // ── Stock
  put(g, bx(0.62,  0.165, 0.078, stk), -0.45, -0.03, 0);
  // Cheek piece
  put(g, bx(0.32, 0.068, 0.035, stk), -0.35, 0.073, -0.056);
  // Thumb-hole (cut into stock look — darker box)
  put(g, bx(0.16, 0.08, 0.08, M(0x0c1009, 0.95, 0.05)), -0.265, -0.022, 0);
  // Butt pad
  put(g, bx(0.034, 0.2, 0.088, grip), -0.768, -0.022, 0);

  // ── Pistol grip
  const grp = new THREE.Group();
  put(grp, bx(0.058, 0.22, 0.074, grip), 0, -0.065, 0);
  for (let i = 0; i < 5; i++)
    put(grp, bx(0.06, 0.011, 0.076, M(0x08100a, 0.93, 0.02)), 0, -0.014 - i * 0.036, 0);
  put(grp, bx(0.05, 0.065, 0.072, grip), 0, 0.125, 0);
  grp.position.set(-0.08, -0.09, 0); grp.rotation.z = 0.22;
  g.add(grp);

  // ── Trigger guard
  put(g, bx(0.155, 0.012, 0.05, act), -0.1,  -0.105, 0);
  put(g, bx(0.012, 0.078, 0.05, act), -0.022,-0.067, 0);
  put(g, bx(0.012, 0.078, 0.05, act), -0.177,-0.067, 0);
  put(g, bx(0.01,  0.048, 0.013, blt), -0.1, -0.065, 0); // trigger

  // ── Bolt handle (right side, protrudes along +Z)
  put(g, cy(0.014, 0.014, 0.15, 8, blt), 0.1, 0.088, 0.037, HX); // along Z
  put(g, cy(0.030, 0.030, 0.042, 12, blt), 0.1, 0.088, 0.115, HX); // knob (along Z)
  // Grip lines on knob
  for (let i = 0; i < 4; i++)
    put(g, cy(0.032, 0.032, 0.004, 12, act), 0.1, 0.088, 0.098 + i * 0.011, HX);

  // ── Detachable magazine
  const mag = new THREE.Group();
  put(mag, bx(0.058, 0.15, 0.065, act), 0, -0.055, 0);
  put(mag, bx(0.063, 0.024, 0.068, grip), 0, -0.138, 0); // base
  put(mag, bx(0.055, 0.028, 0.062, mnt), 0,  0.089, 0);  // lips
  mag.position.set(-0.04, -0.147, 0);
  g.add(mag);

  // ── Bipod
  put(g, bx(0.058, 0.042, 0.064, bipod), 0.4, -0.008, 0); // mount
  for (let s of [-1, 1]) {
    // Upper leg
    const legU = cy(0.008, 0.008, 0.19, 8, bipod);
    legU.position.set(0.4, -0.105, s * 0.042); legU.rotation.z = s * 0.3;
    g.add(legU);
    // Lower leg
    const legL = cy(0.007, 0.006, 0.16, 8, bipod);
    legL.position.set(0.4 + s * 0.032, -0.272, s * 0.065); legL.rotation.z = s * 0.4;
    g.add(legL);
    // Foot cap
    put(g, cy(0.013, 0.013, 0.022, 6, bipod), 0.4 + s * 0.062, -0.348, s * 0.088);
  }

  // Center: x ~[-0.785, 1.565] → center ~0.39
  //         y ~[-0.35,  0.31]  → center ~-0.02
  g.position.set(-0.39, 0.02, 0);
  return g;
}

// ═══════════════════════════════════════════════════════════════════════════
// Gun database
// ═══════════════════════════════════════════════════════════════════════════
const GUNS = [
  {
    name: 'M4A1', type: '돌격소총 · ASSAULT RIFLE',
    stats: [
      { l:'탄창', v:'30발',   b:60  },
      { l:'연사력', v:'900rpm', b:92  },
      { l:'사거리', v:'중거리', b:68  },
      { l:'데미지', v:'25',    b:42  },
    ],
    mk: mkM4
  },
  {
    name: 'SPAS-12', type: '산탄총 · SHOTGUN',
    stats: [
      { l:'탄창', v:'8발',    b:16  },
      { l:'연사력', v:'90rpm',  b:18  },
      { l:'사거리', v:'근거리', b:28  },
      { l:'데미지', v:'80×8',  b:90  },
    ],
    mk: mkSPAS
  },
  {
    name: 'AWP', type: '저격소총 · SNIPER RIFLE',
    stats: [
      { l:'탄창', v:'5발',    b:10  },
      { l:'연사력', v:'45rpm',  b:8   },
      { l:'사거리', v:'원거리', b:100 },
      { l:'데미지', v:'150',   b:100 },
    ],
    mk: mkAWP
  }
];

// ── State ─────────────────────────────────────────────────────────────────
let curGrp = null;
let autoRot = true, lastTouch = 0;
let clock = 0;

function loadGun(idx) {
  if (curGrp) { scene.remove(curGrp); curGrp = null; }
  curGrp = GUNS[idx].mk();
  curGrp.rotation.y = 0.55; // nice initial 3/4 angle
  scene.add(curGrp);

  document.getElementById('gname').textContent = GUNS[idx].name;
  document.getElementById('gtype').textContent = GUNS[idx].type;
  document.getElementById('stats').innerHTML = GUNS[idx].stats.map(s =>
    `<div class="st">
       <div class="sv">${s.v}</div>
       <div class="sb"><div class="sbf" style="width:${s.b}%"></div></div>
       <div class="sl">${s.l}</div>
     </div>`
  ).join('');

  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('on', i === idx));
  oc.reset();
  cam.position.set(0, 0.55, 4.6);
  oc.target.set(0, 0, 0);
}

window.sel = (i) => loadGun(i);

window.addEventListener('keydown', e => {
  if (e.key === '1') sel(0);
  if (e.key === '2') sel(1);
  if (e.key === '3') sel(2);
});

canvas.addEventListener('pointerdown', () => { autoRot = false; lastTouch = Date.now(); });
canvas.addEventListener('pointerup',   () => { lastTouch = Date.now(); });

window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  R.setSize(innerWidth, innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  clock += 0.016;

  if (!autoRot && Date.now() - lastTouch > 2800) autoRot = true;

  if (curGrp) {
    if (autoRot) curGrp.rotation.y += 0.0038;
    curGrp.position.y = Math.sin(clock * 0.65) * 0.022;
  }
  oc.update();
  R.render(scene, cam);
}

loadGun(0);
animate();
</script>
